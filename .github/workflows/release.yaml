name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check version matches tag
        run: nix develop --command just verify-version ${GITHUB_REF_NAME#v}
        # run: |
        #   CARGO_VERSION=$(nix develop --command cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
        #   TAG_VERSION="${GITHUB_REF_NAME#v}"
        #   if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
        #     echo "❌ Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
        #     exit 1
        #   fi
        #   echo "✓ Version $CARGO_VERSION matches tag"

  build:
    name: Build · ${{ matrix.target }}
    needs: verify-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build
        run: nix build .#aes

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARTIFACT="aes-${VERSION}-${{ matrix.target }}"
          cp result/bin/aes "${ARTIFACT}"
          tar czf "${ARTIFACT}.tar.gz" "${ARTIFACT}"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: aes-${{ matrix.target }}
          path: |
            *.tar.gz
            *.sha256

  # ------------------------------------------------------------------ #
  # Publish to GitHub Releases                                           #
  # ------------------------------------------------------------------ #
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
